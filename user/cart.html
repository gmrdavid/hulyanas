<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Hulyanas Hill</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #e5e5e5;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo i {
            color: #000;
            font-size: 1.8rem;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: #4a4a4a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .nav-menu a:hover {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        .btn-logout {
            background: #1a1a1a !important;
            color: #fff !important;
            padding: 0.75rem 1.5rem !important;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #000 !important;
        }

        .cart-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 140px 2rem 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .cart-total {
            font-size: 2rem;
            font-weight: 700;
            color: #000;
            font-feature-settings: 'tnum' 1;
        }

        .cart-empty {
            text-align: center;
            padding: 4rem 2rem;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        .cart-empty i {
            font-size: 4rem;
            color: #ccc;
            margin-bottom: 1.5rem;
        }

        .cart-empty h3 {
            font-size: 1.5rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .cart-empty p {
            color: #999;
            font-size: 1.1rem;
        }

        .cart-content {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 3rem;
        }

        .cart-items {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            overflow: hidden;
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 2rem;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s ease;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .cart-item:hover {
            background: #f8f8f8;
        }

        .item-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 1.5rem;
            flex-shrink: 0;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .item-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 1rem;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .quantity-btn {
            width: 40px;
            height: 40px;
            border: 1px solid #e0e0e0;
            background: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1rem;
            color: #666;
        }

        .quantity-btn:hover {
            border-color: #1a1a1a;
            color: #1a1a1a;
            background: #f0f0f0;
        }

        .quantity {
            font-weight: 600;
            min-width: 24px;
            text-align: center;
            color: #1a1a1a;
        }

        .remove-item {
            color: #999;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.2s ease;
        }

        .remove-item:hover {
            color: #1a1a1a;
        }

        .checkout-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .order-summary {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .order-summary h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            font-size: 1.1rem;
        }

        .summary-row.total {
            font-weight: 700;
            font-size: 1.5rem;
            border-top: 2px solid #f0f0f0;
            padding-top: 1.5rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #fff;
            width: 100%;
        }

        .btn-primary:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #1a1a1a;
            border: 1px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #f0f0f0;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #fff;
            margin: 5% auto;
            padding: 3rem;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
        }

        .close {
            position: absolute;
            right: 2rem;
            top: 2rem;
            font-size: 2rem;
            font-weight: 700;
            color: #999;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .close:hover {
            color: #1a1a1a;
        }

        .modal h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s ease;
            background: #fff;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a1a1a;
            box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .cart-content {
                grid-template-columns: 1fr;
            }

            .checkout-section {
                order: -1;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                text-align: center;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .cart-container {
                padding: 120px 1rem 2rem;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease forwards;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-logo">
                <i class="fas fa-utensils"></i>
                <span>Hulyanas Hill</span>
            </a>
            <ul class="nav-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="menu.html"><i class="fas fa-utensils"></i> Menu</a></li>
                <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
                <li><a href="orders.html"><i class="fas fa-list"></i> Orders</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="#" id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="cart-container">
        <div class="page-header">
            <h1>My Cart</h1>
            <div class="cart-total" id="cartTotal">$0.00</div>
        </div>

        <div class="cart-content">
            <div class="cart-items" id="cartItems">
                <div class="cart-empty fade-in-up">
                    <i class="fas fa-shopping-cart"></i>
                    <h3>Your cart is empty</h3>
                    <p>Add some delicious items from the menu to get started</p>
                    <a href="menu.html" class="btn btn-primary" style="margin-top: 1.5rem;">Browse Menu</a>
                </div>
            </div>
            
            <div class="checkout-section">
                <div class="order-summary fade-in-up">
                    <h3>Order Summary</h3>
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">$0.00</span>
                    </div>
                    <button class="btn btn-primary full-width" id="checkoutBtn" style="display: none;">
                        Proceed to Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Checkout</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>Delivery Address *</label>
                    <textarea id="deliveryAddress" rows="3" placeholder="Enter your full delivery address" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="deliveryPhone" placeholder="+1 (555) 123-4567" required>
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="paymentMethod">
                            <option value="cash">Cash on Delivery</option>
                            <option value="card">Credit/Debit Card</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary full-width">Place Order</button>
            </form>
        </div>
    </div>

    <script>
        // Sample cart data (replace with your actual cart logic)
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCart() {
            const cartItemsEl = document.getElementById('cartItems');
            const cartTotalEl = document.getElementById('cartTotal');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('total');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (cart.length === 0) {
                cartItemsEl.innerHTML = `
                    <div class="cart-empty fade-in-up">
                        <i class="fas fa-shopping-cart"></i>
                        <h3>Your cart is empty</h3>
                        <p>Add some delicious items from the menu to get started</p>
                        <a href="menu.html" class="btn btn-primary" style="margin-top: 1.5rem;">Browse Menu</a>
                    </div>
                `;
                cartTotalEl.textContent = '$0.00';
                subtotalEl.textContent = '$0.00';
                totalEl.textContent = '$0.00';
                checkoutBtn.style.display = 'none';
                return;
            }

            let total = 0;
            cartItemsEl.innerHTML = cart.map((item, index) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item fade-in-up" data-index="${index}">
                        <img src="${item.image || 'https://via.placeholder.com/80x80/1a1a1a/ffffff?text=🍕'}" 
                             alt="${item.name}" class="item-image">
                        <div class="item-details">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">$${item.price.toFixed(2)}</div>
                            <div class="quantity-controls">
                                <button class="quantity-btn" onclick="updateQuantity(${index}, -1)">−</button>
                                <span class="quantity">${item.quantity}</span>
                                <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">+</button>
                            </div>
                        </div>
                        <a href="#" class="remove-item" onclick="removeItem(${index}); return false;" title="Remove item">
                            <i class="fas fa-times"></i>
                        </a>
                    </div>
                `;
            }).join('');

            const formattedTotal = total.toFixed(2);
            cartTotalEl.textContent = `$${formattedTotal}`;
            subtotalEl.textContent = `$${formattedTotal}`;
            totalEl.textContent = `$${formattedTotal}`;
            checkoutBtn.style.display = 'block';
        }

        function updateQuantity(index, change) {
            if (cart[index]) {
                cart[index].quantity += change;
                if (cart[index].quantity <= 0) {
                    cart.splice(index, 1);
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
            }
        }

        function removeItem(index) {
            if (cart[index]) {
                cart.splice(index, 1);
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
            }
        }

        // Modal functionality
        const modal = document.getElementById('checkoutModal');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const closeBtn = document.querySelector('.close');
        const checkoutForm = document.getElementById('checkoutForm');

        checkoutBtn.addEventListener('click', () => {
            if (cart.length > 0) {
                modal.style.display = 'block';
            }
        });

        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        checkoutForm.addEventListener('submit', (e) => {
            e.preventDefault();
            // Process order (save to localStorage or send to server)
            const order = {
                id: Date.now(),
                items: cart,
                total: parseFloat(document.getElementById('total').textContent.replace('$', '')),
                address: document.getElementById('deliveryAddress').value,
                phone: document.getElementById('deliveryPhone').value,
                payment: document.getElementById('paymentMethod').value,
                timestamp: new Date().toISOString()
            };
            
            // Save order
            let orders = JSON.parse(localStorage.getItem('orders')) || [];
            orders.unshift(order);
            localStorage.setItem('orders', JSON.stringify(orders));
            
            // Clear cart
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            
            modal.style.display = 'none';
            renderCart();
            
            // Redirect to orders or show success
            alert('Order placed successfully! Check your orders page.');
            window.location.href = 'orders.html';
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userName');
                window.location.href = 'login.html';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
        });
    </script>
</body>
</html>
