<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Hulyanas Hill</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #e5e5e5;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo i {
            color: #000;
            font-size: 1.8rem;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2rem;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: #4a4a4a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .nav-menu a:hover {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        .btn-logout {
            background: #1a1a1a !important;
            color: #fff !important;
            padding: 0.75rem 1.5rem !important;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #000 !important;
        }

        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 140px 2rem 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .page-header h1 {
            font-size: 2.75rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .profile-content {
            display: flex;
            justify-content: center;
        }

        .profile-card {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 24px;
            padding: 3.5rem;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.12);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 4rem;
            color: #999;
            border: 4px solid #e5e5e5;
            transition: all 0.3s ease;
        }

        .profile-avatar:hover {
            border-color: #1a1a1a;
            background: #f8f8f8;
        }

        .profile-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .profile-header p {
            color: #666;
            font-size: 1.1rem;
        }

        #profileForm {
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1.25rem;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fff;
            font-weight: 400;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(26, 26, 26, 0.08);
            transform: translateY(-1px);
        }

        .form-row {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .btn {
            flex: 1;
            padding: 1.25rem 2rem;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-primary:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #1a1a1a;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #f0f0f0;
            border-color: #1a1a1a;
            transform: translateY(-2px);
        }

        .profile-actions {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid #f0f0f0;
        }

        .btn-danger {
            background: transparent;
            color: #999;
            border: 2px solid #e0e0e0;
            padding: 1rem 2rem;
            font-weight: 500;
        }

        .btn-danger:hover {
            background: #fff;
            color: #666;
            border-color: #ccc;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #fff;
            margin: 8% auto;
            padding: 3.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
            border: 1px solid #e5e5e5;
        }

        .close {
            position: absolute;
            right: 2rem;
            top: 2rem;
            font-size: 2.25rem;
            font-weight: 400;
            color: #999;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close:hover {
            color: #1a1a1a;
            background: #f0f0f0;
        }

        .modal h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .full-width {
            width: 100%;
        }

        @media (max-width: 768px) {
            .profile-container {
                padding: 120px 1rem 2rem;
            }

            .profile-card {
                padding: 2.5rem 2rem;
            }

            .form-row {
                flex-direction: column;
            }

            .page-header h1 {
                font-size: 2.25rem;
            }

            .modal-content {
                margin: 10% 1rem;
                padding: 2.5rem 2rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-logo">
                <i class="fas fa-utensils"></i>
                <span>Hulyanas Hill</span>
            </a>
            <ul class="nav-menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="menu.html"><i class="fas fa-utensils"></i> Menu</a></li>
                <li><a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a></li>
                <li><a href="orders.html"><i class="fas fa-list"></i> Orders</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="#" id="logoutBtn" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="profile-container">
        <div class="page-header">
            <h1>My Profile</h1>
        </div>

        <div class="profile-content">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <h2 id="profileName">John Doe</h2>
                    <p id="profileEmail">john.doe@example.com</p>
                </div>

                <form id="profileForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profileFullName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="profilePhone" placeholder="+1 (555) 123-4567">
                    </div>
                    <div class="form-group">
                        <label>Delivery Address</label>
                        <textarea id="profileAddress" rows="4" placeholder="Enter your default delivery address"></textarea>
                    </div>
                    <div class="form-row">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i>
                            Update Profile
                        </button>
                        <button type="button" class="btn btn-secondary" id="changePasswordBtn">
                            <i class="fas fa-lock"></i>
                            Change Password
                        </button>
                    </div>
                </form>

                <div class="profile-actions">
                    <button class="btn btn-danger" id="deleteAccountBtn">
                        <i class="fas fa-trash"></i>
                        Delete Account
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Change Password</h2>
            <form id="passwordForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" placeholder="Enter current password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Enter new password (min 8 chars)" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmNewPassword" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn btn-primary full-width">
                    <i class="fas fa-lock"></i>
                    Update Password
                </button>
            </form>
        </div>
    </div>

    <script>
        // Profile data
        let profile = JSON.parse(localStorage.getItem('profile')) || {
            name: 'John Doe',
            email: 'john.doe@example.com',
            phone: '',
            address: ''
        };

        function loadProfile() {
            document.getElementById('profileName').textContent = profile.name;
            document.getElementById('profileEmail').textContent = profile.email;
            document.getElementById('profileFullName').value = profile.name;
            document.getElementById('profilePhone').value = profile.phone;
            document.getElementById('profileAddress').value = profile.address;
        }

        // Profile form
        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            profile.name = document.getElementById('profileFullName').value;
            profile.phone = document.getElementById('profilePhone').value;
            profile.address = document.getElementById('profileAddress').value;
            
            localStorage.setItem('profile', JSON.stringify(profile));
            localStorage.setItem('userName', profile.name);
            
            document.getElementById('profileName').textContent = profile.name;
            
            // Visual feedback
            const btn = e.target.querySelector('.btn-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Updated!';
            btn.style.background = '#000';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '#1a1a1a';
            }, 2000);
        });

        // Password modal
        const passwordModal = document.getElementById('passwordModal');
        const changePasswordBtn = document.getElementById('changePasswordBtn');
        const closeBtn = document.querySelector('.close');
        const passwordForm = document.getElementById('passwordForm');

        changePasswordBtn.addEventListener('click', () => {
            passwordModal.style.display = 'block';
        });

        closeBtn.addEventListener('click', () => {
            passwordModal.style.display = 'none';
            passwordForm.reset();
        });

        window.addEventListener('click', (e) => {
            if (e.target === passwordModal) {
                passwordModal.style.display = 'none';
                passwordForm.reset();
            }
        });

        passwordForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmNewPassword').value;
            
            if (newPass !== confirm) {
                alert('Passwords do not match!');
                return;
            }
            
            if (newPass.length < 8) {
                alert('New password must be at least 8 characters!');
                return;
            }
            
            // Save password hash (in production, use proper backend)
            localStorage.setItem('passwordHash', btoa(newPass));
            passwordModal.style.display = 'none';
            passwordForm.reset();
            
            // Visual feedback
            changePasswordBtn.innerHTML = '<i class="fas fa-check"></i> Password Updated';
            setTimeout(() => {
                changePasswordBtn.innerHTML = '<i class="fas fa-lock"></i> Change Password';
            }, 2000);
        });

        // Delete account
        document.getElementById('deleteAccountBtn').addEventListener('click', () => {
            if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('userName');
                window.location.href = 'login.html';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
        });
    </script>
</body>
</html>
