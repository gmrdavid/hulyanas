<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Hulyanas Hill</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* SAME MINIMAL BLACK & WHITE THEME + WIDENED */
        * {
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: #ffffff;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%, rgba(255,255,255,0.02) 100%);
            pointer-events: none;
        }

        .auth-container {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            position: relative;
            z-index: 2;
        }

        .auth-card {
            /* WIDENED: Perfect for register form */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 50px;
            border-radius: 24px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.05);
            width: 500%;
            max-width: 520px; /* Same as login */
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 54px 24px 0 0;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 0px;
        }

        .auth-header i {
            font-size: 4rem;
            color: #ffffff;
            margin-bottom: 0px;
            display: block;
            opacity: 0.8;
        }

        .auth-header h2 {
            color: #ffffff;
            font-size: 2.3rem;
            font-weight: 200;
            margin-bottom: 1px;
            letter-spacing: -0.5px;
        }

        /* Form Layout */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 0; /* Reset for grid */
        }

        .form-group.full {
            grid-column: 1 / -1;
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 14px;
            color: rgba(255,255,255,0.8);
            font-weight: 400;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 10px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            font-size: 1.05rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            font-weight: 300;
            color: #ffffff;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.1);
        }

        .btn {
            width: 100%;
            padding: 10px 14px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.05rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .auth-links {
            text-align: center;
            margin-top: 15px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .auth-links p {
            margin-bottom: 18px;
            color: rgba(255,255,255,0.5);
            font-size: 0.95rem;
        }

        .auth-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-weight: 400;
            transition: all 0.3s ease;
            position: relative;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-links a:hover {
            color: #ffffff;
        }

        /* Loading */
        .loading {
            pointer-events: none;
        }

        .loading .btn::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .auth-card {
                padding: 50px 30px;
                max-width: 450px;
            }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 40px 25px;
                max-width: 380px;
            }
        }

        /* Entrance animation */
        .auth-card {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h2>Create Account</h2>
                <p>Join Hulyanas Hill today</p>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="phone" placeholder="Enter phone number">
                    </div>
                </div>
                <div class="form-group full">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
                <div class="form-group full">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Create password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary full-width">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>
            
            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
                <a href="../index.html">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('registerForm');
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const btn = form.querySelector('.btn');
                const originalText = btn.innerHTML;
                
                // Simple validation
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (password !== confirmPassword) {
                    showMessage('Passwords do not match!', 'error');
                    return;
                }
                
                btn.classList.add('loading');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
                
                setTimeout(() => {
                    btn.classList.remove('loading');
                    btn.innerHTML = originalText;
                    showMessage('Account created successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                }, 2000);
            });
        });

        function showMessage(text, type) {
            // Create message element if doesn't exist
            let msg = document.querySelector('.message');
            if (!msg) {
                msg = document.createElement('div');
                msg.className = 'message';
                form.parentNode.insertBefore(msg, form);
            }
            msg.textContent = text;
            msg.className = `message ${type}`;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 4000);
        }
    </script>
</body>
</html>
