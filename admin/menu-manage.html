<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Management - Hulyanas Hill</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #1a1a1a;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo i {
            color: #000;
            font-size: 1.8rem;
        }

        .admin-logo i {
            color: #1a1a1a;
            background: #f0f0f0;
            padding: 0.5rem;
            border-radius: 12px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: #4a4a4a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            position: relative;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-logout {
            background: #1a1a1a !important;
            color: #fff !important;
            padding: 0.75rem 2rem !important;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #000 !important;
            transform: translateY(-1px);
        }

        .admin-content {
            max-width: 1400px;
            margin: 140px auto 2rem;
            padding: 0 2rem;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .content-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-family: inherit;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-primary:hover {
            background: #000;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #1a1a1a;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #f0f0f0;
            border-color: #1a1a1a;
        }

        .btn-danger {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .btn-danger:hover {
            background: #f5c2c5;
        }

        .btn-success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .table-container {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .menu-table {
            width: 100%;
            border-collapse: collapse;
        }

        .menu-table thead {
            background: #f8f9fa;
        }

        .menu-table th {
            padding: 1.5rem 2rem;
            text-align: left;
            font-weight: 600;
            color: #1a1a1a;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e5e5e5;
        }

        .menu-table td {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #f5f5f5;
            vertical-align: middle;
        }

        .menu-table tr:hover {
            background: #f8f8f8;
        }

        .item-image {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
        }

        .item-name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 1.1rem;
        }

        .item-price {
            font-weight: 700;
            color: #000;
            font-size: 1.25rem;
            font-feature-settings: 'tnum' 1;
        }

        .item-status {
            padding: 0.5rem 1.25rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-available {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-unavailable {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .table-actions {
            display: flex;
            gap: 0.75rem;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .action-edit {
            background: #1a1a1a;
            color: #fff;
        }

        .action-edit:hover {
            background: #000;
            transform: scale(1.1);
        }

        .action-delete {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .action-delete:hover {
            background: #f5c2c5;
            transform: scale(1.1);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #fff;
            margin: 5% auto;
            padding: 3.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
            border: 1px solid #e5e5e5;
        }

        .close {
            position: absolute;
            right: 2rem;
            top: 2rem;
            font-size: 2.25rem;
            font-weight: 400;
            color: #999;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid #e0e0e0;
        }

        .close:hover {
            color: #1a1a1a;
            background: #f0f0f0;
        }

        .modal h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1.25rem;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fff;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(26, 26, 26, 0.08);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .form-actions {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .image-preview {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px dashed #e0e0e0;
            margin-top: 1rem;
            display: block;
        }

        @media (max-width: 768px) {
            .admin-content {
                padding: 0 1rem;
                margin: 120px 1rem 2rem;
            }

            .content-header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-actions {
                flex-direction: column;
            }

            .table-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="nav-logo admin-logo">
                <i class="fas fa-user-shield"></i>
                <span>Admin Panel</span>
            </a>
            <ul class="nav-menu">
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="menu-manage.html" class="active"><i class="fas fa-utensils"></i> Menu</a></li>
                <li><a href="orders.html"><i class="fas fa-list"></i> Orders</a></li>
                <li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="#" id="adminLogout" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="admin-content">
        <div class="content-header">
            <h1>Menu Management</h1>
            <button class="btn btn-primary" onclick="showAddModal()">
                <i class="fas fa-plus"></i>
                Add New Item
            </button>
        </div>

        <div class="table-container">
            <table class="menu-table" id="menuTable">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="menuItems">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="menuModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="hideMenuModal()">&times;</span>
            <h2 id="modalTitle">Add New Menu Item</h2>
            <form id="menuForm">
                <div class="form-group">
                    <label>Name *</label>
                    <input type="text" id="itemName" placeholder="e.g. Margherita Pizza" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="itemDescription" rows="3" placeholder="Delicious description of your menu item..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Price *</label>
                        <input type="number" id="itemPrice" step="0.01" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="itemCategory" required>
                            <option value="">Select category</option>
                            <option value="Main Course">Main Course</option>
                            <option value="Appetizer">Appetizer</option>
                            <option value="Dessert">Dessert</option>
                            <option value="Drinks">Drinks</option>
                            <option value="Bread">Bread</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Image</label>
                    <input type="file" id="itemImage" accept="image/*">
                    <img id="imagePreview" class="image-preview" style="display: none;">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="itemStatus">
                        <option value="available">Available</option>
                        <option value="unavailable">Unavailable</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Item</button>
                    <button type="button" class="btn btn-secondary" onclick="hideMenuModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Sample menu data
        let menuItems = JSON.parse(localStorage.getItem('menuItems')) || [
            {
                id: 1,
                name: 'Margherita Pizza',
                description: 'Classic pizza with fresh mozzarella and basil',
                price: 12.99,
                category: 'Main Course',
                status: 'available',
                image: 'https://via.placeholder.com/60x60/1a1a1a/ffffff?text=🍕'
            },
            {
                id: 2,
                name: 'Truffle Pasta',
                description: 'Creamy pasta with truffle oil',
                price: 18.50,
                category: 'Main Course',
                status: 'available',
                image: 'https://via.placeholder.com/60x60/1a1a1a/ffffff?text=🍝'
            },
            {
                id: 3,
                name: 'Garlic Bread',
                description: 'Freshly baked garlic bread',
                price: 6.99,
                category: 'Bread',
                status: 'unavailable',
                image: 'https://via.placeholder.com/60x60/1a1a1a/ffffff?text=🍞'
            },
            {
                id: 4,
                name: 'Tiramisu',
                description: 'Classic Italian dessert',
                price: 8.75,
                category: 'Dessert',
                status: 'available',
                image: 'https://via.placeholder.com/60x60/1a1a1a/ffffff?text=🍮'
            }
        ];

        function renderMenuTable() {
            const tbody = document.getElementById('menuItems');
            tbody.innerHTML = menuItems.map(item => `
                <tr>
                    <td><img src="${item.image}" alt="${item.name}" class="item-image"></td>
                    <td>
                        <div class="item-name">${item.name}</div>
                        <div style="font-size: 0.9rem; color: #666; margin-top: 0.25rem;">${item.description?.substring(0, 50)}${item.description?.length > 50 ? '...' : ''}</div>
                    </td>
                    <td style="font-weight: 500; color: #1a1a1a;">${item.category}</td>
                    <td><span class="item-price">$${item.price.toFixed(2)}</span></td>
                    <td><span class="item-status status-${item.status}">${item.status}</span></td>
                    <td>
                        <div class="table-actions">
                            <button class="action-btn action-edit" onclick="editItem(${item.id})" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-btn action-delete" onclick="deleteItem(${item.id})" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function showAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Menu Item';
            document.getElementById('menuForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('menuModal').style.display = 'block';
        }

        function hideMenuModal() {
            document.getElementById('menuModal').style.display = 'none';
            document.getElementById('menuForm').reset();
            document.getElementById('imagePreview').style.display = 'none';
        }

        function editItem(id) {
            const item = menuItems.find(item => item.id === id);
            if (item) {
                document.getElementById('modalTitle').textContent = 'Edit Menu Item';
                document.getElementById('itemName').value = item.name;
                document.getElementById('itemDescription').value = item.description || '';
                document.getElementById('itemPrice').value = item.price;
                document.getElementById('itemCategory').value = item.category;
                document.getElementById('itemStatus').value = item.status;
                document.getElementById('menuModal').style.display = 'block';
                window.currentEditId = id;
            }
        }

        function deleteItem(id) {
            if (confirm('Are you sure you want to delete this menu item?')) {
                menuItems = menuItems.filter(item => item.id !== id);
                localStorage.setItem('menuItems', JSON.stringify(menuItems));
                renderMenuTable();
            }
        }

        // Form handling
        document.getElementById('menuForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = {
                id: window.currentEditId || Date.now(),
                name: document.getElementById('itemName').value,
                description: document.getElementById('itemDescription').value,
                price: parseFloat(document.getElementById('itemPrice').value),
                category: document.getElementById('itemCategory').value,
                status: document.getElementById('itemStatus').value,
                image: document.getElementById('itemImage').files[0] ? URL.createObjectURL(document.getElementById('itemImage').files[0]) : null
            };

            const index = menuItems.findIndex(item => item.id === window.currentEditId);
            if (index > -1) {
                menuItems[index] = formData;
            } else {
                menuItems.push(formData);
            }

            localStorage.setItem('menuItems', JSON.stringify(menuItems));
            hideMenuModal();
            renderMenuTable();
        });

        // Image preview
        document.getElementById('itemImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const preview = document.getElementById('imagePreview');
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        });

        // Modal close handlers
        window.onclick = function(event) {
            const modal = document.getElementById('menuModal');
            if (event.target === modal) {
                hideMenuModal();
            }
        }

        // Admin logout
        document.getElementById('adminLogout').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Are you sure you want to logout from admin panel?')) {
                window.location.href = 'login.html';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderMenuTable();
        });
    </script>
</body>
</html>
