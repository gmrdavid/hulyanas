<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Hulyanas Hill Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #1a1a1a;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo i {
            color: #000;
            font-size: 1.8rem;
        }

        .admin-logo i {
            color: #1a1a1a;
            background: #f0f0f0;
            padding: 0.5rem;
            border-radius: 12px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: #4a4a4a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            position: relative;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-logout {
            background: #1a1a1a !important;
            color: #fff !important;
            padding: 0.75rem 2rem !important;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #000 !important;
            transform: translateY(-1px);
        }

        .admin-content {
            max-width: 1400px;
            margin: 140px auto 2rem;
            padding: 0 2rem;
        }

        .page-stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #fff;
            border: 1px solid #e5e5e5;
            padding: 1.5rem 2rem;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 200px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .stat-icon {
            font-size: 2rem;
            color: #1a1a1a;
            opacity: 0.8;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f0f0;
        }

        .stat-info h3 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 0.25rem;
        }

        .stat-info p {
            color: #666;
            font-size: 0.9rem;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .content-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .search-filter {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input {
            padding: 1rem 1.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 1rem;
            background: #fff;
            width: 300px;
        }

        .filter-select {
            padding: 1rem 1.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 1rem;
            background: #fff;
        }

        .table-container {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table thead {
            background: #f8f9fa;
        }

        .users-table th {
            padding: 1.5rem 2rem;
            text-align: left;
            font-weight: 600;
            color: #1a1a1a;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e5e5e5;
        }

        .users-table td {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #f5f5f5;
            vertical-align: middle;
        }

        .users-table tr:hover {
            background: #f8f8f8;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a1a, #333);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1rem;
            margin-right: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 1.1rem;
        }

        .user-email {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .user-role {
            padding: 0.5rem 1.25rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-customer { 
            background: #e3f2fd; 
            color: #1976d2; 
            border: 1px solid #bbdefb; 
        }

        .role-admin { 
            background: #fff3e0; 
            color: #ef6c00; 
            border: 1px solid #ffcc80; 
        }

        .role-staff { 
            background: #f3e5f5; 
            color: #7b1fa2; 
            border: 1px solid #e1bee7; 
        }

        .date-joined {
            color: #666;
            font-size: 0.9rem;
        }

        .table-actions {
            display: flex;
            gap: 0.75rem;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }

        .action-view {
            background: #1a1a1a;
            color: #fff;
        }

        .action-view:hover {
            background: #000;
            transform: scale(1.05);
        }

        .action-edit {
            background: #f0f0f0;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .action-edit:hover {
            background: #e0e0e0;
            color: #1a1a1a;
            transform: scale(1.05);
        }

        .action-delete {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .action-delete:hover {
            background: #f5c2c5;
            transform: scale(1.05);
        }

        .action-promote {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .action-promote:hover {
            background: #c8e6c9;
        }

        @media (max-width: 768px) {
            .admin-content {
                padding: 0 1rem;
                margin: 120px 1rem 2rem;
            }

            .content-header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }

            .search-filter {
                width: 100%;
                justify-content: center;
            }

            .search-input {
                width: 100%;
            }

            .table-actions {
                flex-direction: column;
            }

            .page-stats {
                flex-direction: column;
            }
        }
    </style>
</head>
body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="admin-dashboard.html" class="nav-logo admin-logo">
                <i class="fas fa-user-shield"></i>
                <span>Admin Panel</span>
            </a>
            <ul class="nav-menu">
                <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="menu-manage.html"><i class="fas fa-utensils"></i> Menu</a></li>
                <li><a href="orders.html"><i class="fas fa-list"></i> Orders</a></li>
                <li><a href="users.html" class="active"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="#" id="adminLogout" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="admin-content">
        <div class="page-stats">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalUsers">0</h3>
                    <p>Total Users</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalAdmins">0</h3>
                    <p>Admins</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-calendar-plus"></i>
                </div>
                <div class="stat-info">
                    <h3 id="newUsersToday">0</h3>
                    <p>New Today</p>
                </div>
            </div>
        </div>

        <div class="content-header">
            <h1>User Management</h1>
            <div class="search-filter">
                <input type="text" class="search-input" placeholder="Search users..." id="userSearch">
                <select class="filter-select" id="roleFilter">
                    <option value="">All Roles</option>
                    <option value="customer">Customers</option>
                    <option value="admin">Admins</option>
                    <option value="staff">Staff</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table class="users-table" id="usersTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Email</th>
                        <th>Full Name</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersList">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Sample users data
        let users = JSON.parse(localStorage.getItem('users')) || [
            {
                id: 1,
                username: 'johndoe',
                email: 'john.doe@email.com',
                fullName: 'John Doe',
                phone: '+1 (555) 123-4567',
                role: 'customer',
                joined: '2024-01-15T10:30:00Z',
                avatar: 'JD'
            },
            {
                id: 2,
                username: 'sarahwilson',
                email: 'sarah.wilson@email.com',
                fullName: 'Sarah Wilson',
                phone: '+1 (555) 987-6543',
                role: 'customer',
                joined: '2024-01-14T14:22:00Z',
                avatar: 'SW'
            },
            {
                id: 3,
                username: 'admin',
                email: 'admin@hulyanashill.com',
                fullName: 'Admin User',
                phone: '+1 (555) 000-0000',
                role: 'admin',
                joined: '2023-12-01T09:00:00Z',
                avatar: 'A'
            },
            {
                id: 4,
                username: 'mikejohnson',
                email: 'mike.johnson@email.com',
                fullName: 'Mike Johnson',
                phone: '+1 (555) 456-7890',
                role: 'staff',
                joined: '2024-01-10T16:45:00Z',
                avatar: 'MJ'
            },
            {
                id: 5,
                username: 'emilybrown',
                email: 'emily.brown@email.com',
                fullName: 'Emily Brown',
                phone: '+1 (555) 321-0987',
                role: 'customer',
                joined: '2024-01-13T11:20:00Z',
                avatar: 'EB'
            }
        ];

        function renderUsersTable(filteredUsers = users) {
            const tbody = document.getElementById('usersList');
            const totalUsersEl = document.getElementById('totalUsers');
            const totalAdminsEl = document.getElementById('totalAdmins');
            const newUsersTodayEl = document.getElementById('newUsersToday');

            // Update stats
            totalUsersEl.textContent = users.length;
            totalAdminsEl.textContent = users.filter(u => u.role === 'admin').length;
            const today = new Date().toDateString();
            newUsersTodayEl.textContent = users.filter(u => new Date(u.joined).toDateString() === today).length;

            tbody.innerHTML = filteredUsers.map(user => {
                const joinedDate = new Date(user.joined).toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric'
                });
                return `
                    <tr>
                        <td>#${user.id.toString().padStart(4, '0')}</td>
                        <td>
                            <div class="user-info">
                                <div class="user-avatar">${user.avatar}</div>
                                <div>
                                    <div class="user-name">${user.username}</div>
                                    <div class="user-email">${user.email}</div>
                                </div>
                            </div>
                        </td>
                        <td>${user.email}</td>
                        <td>${user.fullName}</td>
                        <td>${user.phone || '—'}</td>
                        <td><span class="user-role role-${user.role}">${user.role}</span></td>
                        <td class="date-joined">${joinedDate}</td>
                        <td>
                            <div class="table-actions">
                                <button class="action-btn action-view" onclick="viewUser(${user.id})" title="View Profile">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="action-btn action-edit" onclick="editUser(${user.id})" title="Edit User">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="action-btn action-promote" onclick="toggleRole(${user.id})" title="Toggle Role">
                                    <i class="fas fa-user-shield"></i>
                                </button>
                                <button class="action-btn action-delete" onclick="deleteUser(${user.id})" title="Delete User">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function viewUser(id) {
            const user = users.find(u => u.id === id);
            if (user) {
                alert(`User Profile:\n\nID: ${user.id}\nUsername: ${user.username}\nEmail: ${user.email}\nFull Name: ${user.fullName}\nPhone: ${user.phone || 'Not provided'}\nRole: ${user.role}\nJoined: ${new Date(user.joined).toLocaleString()}`);
            }
        }

        function editUser(id) {
            const user = users.find(u => u.id === id);
            if (user) {
                const newRole = prompt('Edit user role (customer/admin/staff):', user.role);
                if (newRole && ['customer', 'admin', 'staff'].includes(newRole.toLowerCase())) {
                    user.role = newRole.toLowerCase();
                    localStorage.setItem('users', JSON.stringify(users));
                    renderUsersTable();
                }
            }
        }

        function toggleRole(id) {
            const user = users.find(u => u.id === id);
            if (user) {
                const roles = ['customer', 'staff', 'admin'];
                const currentIndex = roles.indexOf(user.role);
                const nextRole = roles[(currentIndex + 1) % roles.length];
                user.role = nextRole;
                localStorage.setItem('users', JSON.stringify(users));
                renderUsersTable();
            }
        }

        function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user? This action cannot be undone.')) {
                users = users.filter(u => u.id !== id);
                localStorage.setItem('users', JSON.stringify(users));
                renderUsersTable();
            }
        }

        // Search and filter
        document.getElementById('userSearch').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = users.filter(user => 
                user.username.toLowerCase().includes(query) ||
                user.email.toLowerCase().includes(query) ||
                user.fullName.toLowerCase().includes(query)
            );
            renderUsersTable(filtered);
        });

        document.getElementById('roleFilter').addEventListener('change', (e) => {
            const role = e.target.value;
            const filtered = role ? users.filter(user => user.role === role) : users;
            renderUsersTable(filtered);
        });

        // Admin logout
        document.getElementById('adminLogout').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Are you sure you want to logout from admin panel?')) {
                window.location.href = 'login.html';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderUsersTable();
        });
    </script>
</body>
</html>
