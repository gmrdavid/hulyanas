<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Hulyanas Hill</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #1a1a1a;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo i {
            color: #000;
            font-size: 1.8rem;
        }

        .admin-logo i {
            color: #1a1a1a;
            background: #f0f0f0;
            padding: 0.5rem;
            border-radius: 12px;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: #4a4a4a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            position: relative;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-logout {
            background: #1a1a1a !important;
            color: #fff !important;
            padding: 0.75rem 2rem !important;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-logout:hover {
            background: #000 !important;
            transform: translateY(-1px);
        }

        .admin-dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 140px 2rem 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            background: #fff;
            border: 1px solid #e5e5e5;
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #1a1a1a, #333);
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            border-color: #d0d0d0;
        }

        .stat-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            color: #1a1a1a;
            opacity: 0.8;
        }

        .stat-number {
            font-size: 2.75rem;
            font-weight: 700;
            color: #000;
            margin-bottom: 0.5rem;
            font-feature-settings: 'tnum' 1;
        }

        .stat-label {
            font-size: 1rem;
            color: #666;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 3rem;
        }

        .content-header {
            margin-bottom: 2rem;
        }

        .content-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .recent-orders-section {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
        }

        .orders-table th,
        .orders-table td {
            padding: 1.25rem 1rem;
            text-align: left;
            border-bottom: 1px solid #f5f5f5;
        }

        .orders-table th {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .orders-table tr:hover {
            background: #f8f8f8;
        }

        .order-status {
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-delivered { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }

        .quick-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .btn-primary {
            background: #1a1a1a;
            color: #fff;
        }

        .btn-primary:hover {
            background: #000;
        }

        .btn-secondary {
            background: transparent;
            color: #666;
            border: 1px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #f0f0f0;
            color: #1a1a1a;
        }

        .btn-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .btn-danger:hover {
            background: #f5c2c5;
        }

        .activity-feed {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 20px;
            padding: 2.5rem;
            height: fit-content;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .activity-item {
            display: flex;
            align-items: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1.5rem;
            font-size: 1.1rem;
            color: #fff;
        }

        .activity-icon.order { background: #1a1a1a; }
        .activity-icon.user { background: #666; }
        .activity-icon.menu { background: #999; }

        .activity-content h4 {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }

        .activity-content p {
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 1024px) {
            .admin-content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .admin-dashboard {
                padding: 120px 1rem 2rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }

            .nav-menu {
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo admin-logo">
                <i class="fas fa-user-shield"></i>
                <span>Admin Panel</span>
            </a>
            <ul class="nav-menu">
                <li><a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="menu-manage.html"><i class="fas fa-utensils"></i> Menu</a></li>
                <li><a href="orders.html"><i class="fas fa-list"></i> Orders</a></li>
                <li><a href="users.html"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="/index.html" id="adminLogout" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="admin-dashboard">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-utensils"></i>
                </div>
                <div class="stat-number" data-target="24">0</div>
                <div class="stat-label">Menu Items</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-list"></i>
                </div>
                <div class="stat-number" data-target="127">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <div class="stat-number" data-target="2456.75">$0</div>
                <div class="stat-label">Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-number" data-target="89">0</div>
                <div class="stat-label">Users</div>
            </div>
        </div>

        <div class="admin-content">
            <div class="recent-orders-section">
                <h1 class="section-title">Recent Orders</h1>
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order #</th>
                            <th>Customer</th>
                            <th>Status</th>
                            <th>Total</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="recentOrders">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>

            <div class="activity-feed">
                <h1 class="section-title">Activity Feed</h1>
                <div id="activityFeed">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Animated counters
        function animateCounters() {
            const counters = document.querySelectorAll('.stat-number');
            counters.forEach(counter => {
                const target = parseFloat(counter.getAttribute('data-target'));
                const isCurrency = counter.textContent.includes('$');
                const updateCounter = () => {
                    const increment = target / 100;
                    let current = 0;
                    const timer = setInterval(() => {
                        current += increment;
                        if (isCurrency) {
                            counter.textContent = `$${current.toFixed(2)}`;
                        } else {
                            counter.textContent = Math.floor(current);
                        }
                        if (current >= target) {
                            clearInterval(timer);
                            counter.textContent = isCurrency ? `$${target.toFixed(2)}` : Math.floor(target);
                        }
                    }, 20);
                };
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        updateCounter();
                        observer.unobserve(counter);
                    }
                });
                observer.observe(counter);
            });
        }

        // Sample data
        const recentOrders = [
            { id: '#123456', customer: 'John Doe', status: 'delivered', total: 28.50, date: '2 min ago' },
            { id: '#123455', customer: 'Sarah Wilson', status: 'pending', total: 42.00, date: '15 min ago' },
            { id: '#123454', customer: 'Mike Johnson', status: 'delivered', total: 19.99, date: '1 hr ago' },
            { id: '#123453', customer: 'Emily Brown', status: 'cancelled', total: 35.75, date: '2 hrs ago' },
            { id: '#123452', customer: 'David Lee', status: 'delivered', total: 52.25, date: '3 hrs ago' }
        ];

        const activityData = [
            { type: 'order', text: 'New order #123456 placed', time: '2 min ago' },
            { type: 'user', text: 'Sarah Wilson registered', time: '15 min ago' },
            { type: 'order', text: 'Order #123454 delivered', time: '1 hr ago' },
            { type: 'menu', text: 'New menu item added: Truffle Pasta', time: '2 hrs ago' },
            { type: 'order', text: 'Order #123453 cancelled', time: '3 hrs ago' }
        ];

        function renderRecentOrders() {
            const tbody = document.getElementById('recentOrders');
            tbody.innerHTML = recentOrders.map(order => `
                <tr>
                    <td>${order.id}</td>
                    <td>${order.customer}</td>
                    <td><span class="order-status status-${order.status}">${order.status}</span></td>
                    <td>$${order.total}</td>
                    <td>${order.date}</td>
                    <td>
                        <div class="quick-actions">
                            <button class="btn btn-primary"><i class="fas fa-eye"></i></button>
                            <button class="btn btn-secondary"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-danger"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderActivityFeed() {
            const feed = document.getElementById('activityFeed');
            feed.innerHTML = activityData.map(activity => `
                <div class="activity-item">
                    <div class="activity-icon ${activity.type}">
                        <i class="fas fa-${activity.type === 'order' ? 'shopping-cart' : activity.type === 'user' ? 'user-plus' : 'utensils'}"></i>
                    </div>
                    <div class="activity-content">
                        <h4>${activity.text}</h4>
                        <p>${activity.time}</p>
                    </div>
                </div>
            `).join('');
        }

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(255, 255, 255, 1)';
                navbar.style.boxShadow = '0 4px 20px rgba(0, 0, 0, 0.1)';
            } else {
                navbar.style.background = 'rgba(255, 255, 255, 0.98)';
                navbar.style.boxShadow = '0 2px 10px rgba(0, 0, 0, 0.05)';
            }
        });

        // Admin logout
        document.getElementById('adminLogout').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Are you sure you want to logout from admin panel?')) {
                window.location.href = '/index.html';
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            animateCounters();
            renderRecentOrders();
            renderActivityFeed();
        });
    </script>
</body>
</html>
